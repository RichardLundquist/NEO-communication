<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="asteroidGradient" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#9ca3af" stop-opacity="1" />
      <stop offset="60%" stop-color="#6b7280" stop-opacity="1" />
      <stop offset="100%" stop-color="#374151" stop-opacity="1" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" fill="#0a0806"/>
  
  <!-- Main asteroid body -->
  <path d="M16 4 C10 4 6 7 4 11 C3 14 3 18 5 22 C7 26 11 28 16 28 C21 28 25 26 27 22 C29 18 29 14 28 11 C26 7 22 4 16 4 Z" 
        fill="url(#asteroidGradient)" 
        stroke="#1f2937" 
        stroke-width="0.5"/>
  
  <!-- Craters -->
  <circle cx="11" cy="10" r="2.5" fill="#4b5563" opacity="0.7"/>
  <circle cx="20" cy="12" r="1.8" fill="#4b5563" opacity="0.6"/>
  <circle cx="14" cy="18" r="2" fill="#4b5563" opacity="0.65"/>
  <circle cx="22" cy="20" r="1.5" fill="#4b5563" opacity="0.6"/>
  <circle cx="9" cy="21" r="1.3" fill="#4b5563" opacity="0.55"/>
  
  <!-- Small impact marks -->
  <circle cx="18" cy="8" r="0.8" fill="#374151" opacity="0.8"/>
  <circle cx="25" cy="15" r="0.7" fill="#374151" opacity="0.7"/>
  <circle cx="7" cy="16" r="0.6" fill="#374151" opacity="0.75"/>
  
  <!-- Highlight for depth -->
  <ellipse cx="13" cy="9" rx="3" ry="2" fill="#d1d5db" opacity="0.2"/>
</svg>
